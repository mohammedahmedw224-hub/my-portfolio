<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محمد عمر | معرض الأعمال</title>

<style>
body {
    font-family: Arial;
    background: #0f0f0f;
    color: #fff;
    margin: 0;
}

/* الفيديو الذكي */
.video-card {
    background: #1a1a1a;
    border-radius: 15px;
    overflow: hidden;
    cursor: pointer;
    position: relative;
    transition: 0.3s;
}

.video-card:hover {
    transform: scale(1.03);
}

/* طبقة التشغيل */
.video-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.4);
}

/* زر التشغيل */
.play-btn {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: #2ecc71;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 30px;
    color: black;
    box-shadow: 0 0 20px #2ecc71;
}

/* iframe */
.video-card iframe {
    width: 100%;
    height: 100%;
    border: none;
}
</style>
</head>

<body>

<h2 style="text-align:center">أعمالي</h2>

<div style="max-width:900px;margin:auto;display:grid;gap:20px">

<!-- فيديو -->
<div class="video-card" onclick="playVideo(this, 'https://drive.google.com/file/d/1VACzwuC_9zvKm7woc8Oty8DQnDuWe6-P/preview')">

    <div class="video-overlay">
        <div class="play-btn">▶</div>
    </div>

</div>

<!-- كرر نفس الكرت -->
<div class="video-card" onclick="playVideo(this, 'https://drive.google.com/file/d/19d621qEtt49TLIgyk4KyFzZGSEGR2Q_C/preview')">

    <div class="video-overlay">
        <div class="play-btn">▶</div>
    </div>

</div>

</div>

<script>
function playVideo(el, url) {
    el.innerHTML = `<iframe src="${url}?autoplay=1" allowfullscreen></iframe>`;
}
</script>

</body>
</html>
